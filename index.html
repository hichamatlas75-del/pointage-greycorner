<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Grey Corner • Master Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg-a:#03040a;
    --bg-b:#070a18;
    --radial1: rgba(255,200,90,.12);
    --radial2: rgba(255,120,40,.08);

    --card-a: rgba(16,18,30,.80);
    --card-b: rgba(4,6,14,.88);
    --card-stroke: rgba(255,255,255,.08);
    --card-inset: rgba(255,255,255,.04);
    --card-shadow: 0 40px 90px rgba(0,0,0,.85);
    --card-glow: 0 0 55px rgba(255,200,90,.10);

    --text:#e8e9ef;
    --muted: rgba(232,233,239,.62);

    --gold:#ffd68a;
    --gold2:#ffb347;

    --surface: rgba(255,255,255,.06);
    --surface2: rgba(255,255,255,.05);
    --stroke: rgba(255,255,255,.10);

    --btnPlan-a:#2F7BFF;
    --btnPlan-b:#1A4ED8;

    --btnConn-a:#FFC34D;
    --btnConn-b:#FF7A18;

    --btnAlt-bg: rgba(255,255,255,.05);
    --btnAlt-stroke: rgba(255,255,255,.10);
    --btnAlt-text: rgba(232,233,239,.92);

    --btnMain-a: var(--gold);
    --btnMain-b: var(--gold2);
    --btnMain-text:#1a1305;

    --bannerBar: rgba(3,4,10,0.78);

    --toastBg: rgba(0,0,0,.82);
    --toastStroke: rgba(255,255,255,.12);
  }

  html,body{
    height:100%;
    margin:0;
    overflow-y:auto;
    overflow-x:hidden;
    background:
      radial-gradient(900px 520px at 50% -10%, var(--radial1), transparent 60%),
      radial-gradient(1100px 700px at 20% 110%, var(--radial2), transparent 62%),
      linear-gradient(180deg,var(--bg-a),var(--bg-b) 45%,var(--bg-a));
    font-family:'Plus Jakarta Sans',sans-serif;
    color:var(--text);
  }

  .card{
    width:100%;
    max-width:420px;
    min-height:96vh;
    border-radius:42px;
    padding:18px;
    display:flex;
    flex-direction:column;
    background:linear-gradient(145deg,var(--card-a),var(--card-b));
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--card-stroke);
    box-shadow:
      inset 0 0 0 1px var(--card-inset),
      var(--card-shadow),
      var(--card-glow);
    position:relative;
    margin:auto;
  }

  .card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:42px;
    pointer-events:none; /* ✅ FIX: l’overlay ne bloque plus les clics */
    background:
      radial-gradient(900px 420px at 50% 25%, rgba(255,255,255,.06), transparent 55%),
      radial-gradient(1200px 700px at 50% 120%, rgba(0,0,0,.40), transparent 55%);
    opacity:.70;
  }

  .content{ position:relative; z-index:1; display:flex; flex-direction:column; flex:1; }
  .gold{ color:var(--gold); letter-spacing:.08em; }
  .muted{ color:var(--muted); }

  .scroll{ overflow-y:auto; scrollbar-width:none; }
  .scroll::-webkit-scrollbar{ display:none }

  .btn-planning{
    background: linear-gradient(180deg,var(--btnPlan-a),var(--btnPlan-b)) !important;
    color:#fff !important;
    padding:18px 16px;
    border-radius:28px;
    font-size:18px;
    font-weight:1000;
    text-transform:uppercase;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    box-shadow:0 18px 36px rgba(0,0,0,.35);
    transition:.2s;
  }
  .btn-planning:active{ transform:scale(.99); }

  .btn-connexion{
    background: linear-gradient(180deg,var(--btnConn-a),var(--btnConn-b)) !important;
    color:#fff !important;
    padding:18px 16px;
    border-radius:28px;
    font-size:18px;
    font-weight:1000;
    text-transform:uppercase;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    box-shadow:0 18px 36px rgba(0,0,0,.35);
    transition:.2s;
  }
  .btn-connexion:active{ transform:scale(.99); }

  .btn-menu{
    background: var(--btnAlt-bg);
    border:1px solid var(--btnAlt-stroke);
    color: var(--btnAlt-text);
    padding:18px 16px;
    border-radius:28px;
    font-size:18px;
    font-weight:1000;
    text-transform:uppercase;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    transition:.2s;
    box-shadow:0 14px 26px rgba(0,0,0,.25);
  }
  .btn-menu:active{ transform:scale(.99); }

  .btn-main{
    background: linear-gradient(180deg,var(--btnMain-a),var(--btnMain-b));
    color:var(--btnMain-text);
    font-weight:1000;
    border-radius:26px;
    padding:26px;
    font-size:26px;
    box-shadow: 0 14px 30px rgba(0,0,0,.28);
    transition:.25s;
  }
  .btn-main:disabled{ opacity:.45; }

  .banner-wrap{
    display:none;
    gap:10px;
    align-items:stretch;
    margin:12px 0;
    position:sticky;
    top:0;
    z-index:20;
    background:var(--bannerBar);
    backdrop-filter:blur(10px);
    padding:6px;
    border-radius:18px;
    border:1px solid var(--stroke);
  }
  .banner{
    flex:1;
    border-radius:16px;
    padding:12px;
    font-weight:900;
    font-size:13px;
    text-align:center;
    border:1px solid var(--stroke);
    word-break:break-word;
    overflow-wrap:anywhere;
  }
  .msg-urgent{ background:#3a0d0d; color:#fff; border:1px solid #ff5a5a; }
  .msg-info{
    background:rgba(255,214,138,.10);
    color:var(--gold);
    border:1px solid rgba(255,214,138,.26);
  }

  .inpt{
    width:100%;
    background:var(--surface);
    border:1px solid var(--stroke);
    border-radius:16px;
    padding:12px;
    color:var(--text);
    font-weight:800;
    font-size:12px;
    outline:none;
  }
  .inpt::placeholder{ color: rgba(232,233,239,.40); }
  .inpt:focus{ border-color: rgba(255,214,138,.35); box-shadow: 0 0 0 3px rgba(255,214,138,.10); }

  .btn-login{
    width:100%;
    border-radius:18px;
    padding:12px;
    font-size:12px;
    font-weight:900;
    text-transform:uppercase;
    background:rgba(255,214,138,.14);
    border:1px solid rgba(255,214,138,.24);
    color:var(--gold);
  }

  .toast{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:18px; z-index:9999;
    background:var(--toastBg);
    border:1px solid var(--toastStroke);
    color:#fff; padding:10px 20px;
    border-radius:14px; font-size:12px; font-weight:900;
    display:none; max-width:min(420px, calc(100vw - 24px));
    text-align:center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 12px; border-radius:999px;
    border:1px solid var(--stroke);
    background:var(--surface2);
    font-size:11px; font-weight:900;
  }

  .home-box{
    background:var(--surface2);
    border:1px solid var(--stroke);
    border-radius:18px;
    padding:12px;
    margin:10px 0 12px 0;
  }

  .sep{
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    margin:12px 0;
  }

  .hint{ font-size:10px; font-weight:900; color:var(--muted); line-height:1.25; }

  .admin-wrap{
    display:none;
    flex-direction:column;
    gap:10px;
    background:var(--surface2);
    border:1px solid var(--stroke);
    border-radius:18px;
    padding:12px;
    margin-top:10px;
  }

  .public-stack{
    position:relative;  /* ✅ FIX: assure le clic */
    z-index:2;          /* ✅ FIX: au-dessus de tout overlay */
    display:flex;
    flex-direction:column;
    gap:18px;
    margin-top:16px;
  }

  .btn-gps-retry{
    margin-top:10px;
    width:100%;
    border-radius:14px;
    padding:10px 12px;
    font-size:11px;
    font-weight:900;
    text-transform:uppercase;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    color:rgba(232,233,239,.92);
    display:none;
  }
  .btn-gps-retry:active{ transform:scale(.99); }
</style>
</head>

<body class="flex items-center justify-center p-4">
  <div class="card">
    <div class="content">

      <div class="text-center flex-shrink-0">
        <img id="logo" src="images/LOGO GREY CORNER.png" class="h-14 mx-auto cursor-pointer" alt="Grey Corner" />
      </div>

      <div id="sessionBar" class="hidden mt-3 mb-2 flex items-center justify-between gap-2">
        <div class="pill">
          <span class="muted">Connecté :</span>
          <span id="roleLabel" class="text-yellow-200">—</span>
        </div>
        <div class="flex items-center gap-2">
          <button id="btnLogout" class="text-[10px] font-black px-3 py-2 rounded-full bg-white/10 border border-white/10">
            Déconnexion
          </button>
        </div>
      </div>

      <div id="publicHome" class="public-stack">
        <button onclick="window.open('https://grey-corner-app.pages.dev/', '_blank')" class="btn-planning">
          🗓️ CONSULTER LE PLANNING
        </button>

        <a href="https://greycorner.pages.dev/" target="_blank" rel="noopener noreferrer" class="btn-menu">
          🌙 MENU
        </a>

        <button id="btnShowLogin" type="button" class="btn-connexion">
          🔐 CONNEXION
        </button>

        <div id="homeMsg" class="hidden home-box">
          <div class="text-[10px] font-black gold uppercase mb-1">Note de service</div>
          <div id="homeMsgContent" class="text-[12px] font-bold">Chargement…</div>
        </div>

        <div id="loginWrap" class="hidden bg-white/5 border border-white/10 rounded-[22px] p-4">
          <div class="text-[10px] font-black uppercase tracking-widest muted mb-2">Connexion</div>
          <div class="space-y-2">
            <input id="loginEmail" class="inpt" type="email" placeholder="Email" autocomplete="username" />
            <input id="loginPass" class="inpt" type="password" placeholder="Mot de passe" autocomplete="current-password" />
            <div id="pinBlock" class="hidden">
              <input id="loginPin" class="inpt" type="password" maxlength="4" placeholder="Créer votre PIN (4 chiffres)" inputmode="numeric" />
              <div class="hint mt-1">Le PIN sert uniquement à réinitialiser cet appareil.</div>
            </div>
            <button id="btnLogin" class="btn-login">Se connecter</button>
            <div id="loginMsg" class="text-[10px] font-black text-red-300"></div>
          </div>
        </div>
      </div>

      <div id="banner-wrap" class="banner-wrap">
        <div id="banner" class="banner"></div>
      </div>

      <div class="sep"></div>

      <div id="app-pointage" class="flex flex-col flex-grow overflow-hidden hidden">
        <div id="selection" class="scroll flex-grow"></div>

        <div id="action" class="hidden flex flex-col flex-grow justify-center">
          <div class="text-center mb-2">
            <div class="text-[10px] muted uppercase font-black tracking-widest">Appareil assigné à</div>
            <div id="username" class="text-3xl font-black mt-1" style="color:var(--gold)">--</div>
          </div>

          <div id="pointage-zone" class="text-center">
            <div id="status" class="text-[10px] mb-4 muted uppercase">Localisation GPS…</div>
            <button id="btn" class="btn-main w-full" disabled>APPUYER POUR VALIDER</button>
            <button id="btnRetryGPS" type="button" class="btn-gps-retry">📍 Réessayer GPS</button>
          </div>

          <button id="btnResetDevice" class="mt-8 text-[10px] uppercase tracking-widest" style="color:var(--muted)">
            Réinitialiser l’appareil (PIN)
          </button>
        </div>

        <div id="adminWrap" class="admin-wrap">
          <div class="admin-title">
            <div class="text-[10px] font-black gold uppercase">Supervision (gérant)</div>
            <button id="btnCloseAdmin" class="text-[10px] font-black px-3 py-2 rounded-full bg-white/10 border border-white/10">Fermer</button>
          </div>
          <div class="admin-list" id="adminList"></div>
          <button id="btnResetAll" class="btn-reset-all">🔄 Reset global (tous les mobiles)</button>
        </div>
      </div>

    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    document.getElementById("btnShowLogin").onclick = () => {
      const wrap = document.getElementById("loginWrap");

</body>
</html>
